<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0e14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>{% block title %}Pelada FC - Sistema de Eventos{% endblock %}</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- CSS Custom -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    
    <style>
        /* ==================== GLOBAL RESET ==================== */
        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #141b22;
            --bg-card: #1a2332;
            --bg-input: #1e293b;
            --bg-hover: #1e293b;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-green: #10b981;
            --accent-green-dark: #059669;
            --accent-red: #ef4444;
            --accent-red-dark: #dc2626;
            --accent-yellow: #f59e0b;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-orange: #f97316;
            --accent-pink: #ec4899;
            --border-color: rgba(255, 255, 255, 0.06);
            --border-color-light: rgba(255, 255, 255, 0.1);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.5);
            --shadow-xl: 0 25px 60px rgba(0, 0, 0, 0.6);
            --shadow-glow-green: 0 0 30px rgba(16, 185, 129, 0.2);
            --shadow-glow-red: 0 0 30px rgba(239, 68, 68, 0.2);
            --shadow-glow-blue: 0 0 30px rgba(59, 130, 246, 0.2);
            --radius-xs: 4px;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-2xl: 24px;
            --radius-full: 9999px;
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 16px;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ==================== SCROLLBAR GLOBAL ==================== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-full);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Firefox */
        * {
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.08) transparent;
        }

        /* ==================== SELECTION ==================== */
        ::selection {
            background: rgba(16, 185, 129, 0.3);
            color: #fff;
        }

        ::-moz-selection {
            background: rgba(16, 185, 129, 0.3);
            color: #fff;
        }

        /* ==================== FOCUS ==================== */
        :focus-visible {
            outline: 2px solid var(--accent-green);
            outline-offset: 2px;
            border-radius: var(--radius-sm);
        }

        /* ==================== UTILITIES ==================== */
        .text-gradient-green {
            background: linear-gradient(135deg, #10b981, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .text-gradient-blue {
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .text-gradient-purple {
            background: linear-gradient(135deg, #8b5cf6, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .glass-effect {
            background: rgba(26, 35, 50, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
        }

        .blur-bg {
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* ==================== ANIMATIONS ==================== */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .animate-fade-in { animation: fadeIn var(--transition-base) ease forwards; }
        .animate-fade-in-up { animation: fadeInUp var(--transition-base) ease forwards; }
        .animate-fade-in-down { animation: fadeInDown var(--transition-base) ease forwards; }
        .animate-scale-in { animation: scaleIn var(--transition-base) ease forwards; }
        .animate-pulse { animation: pulse 2s ease-in-out infinite; }
        .animate-bounce { animation: bounce 2s ease-in-out infinite; }

        /* ==================== SKELETON LOADING ==================== */
        .skeleton {
            background: linear-gradient(90deg, 
                var(--bg-input) 25%, 
                rgba(255, 255, 255, 0.05) 50%, 
                var(--bg-input) 75%
            );
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
            border-radius: var(--radius-sm);
        }

        /* ==================== TOOLTIP CUSTOM ==================== */
        .tooltip-custom {
            position: relative;
        }

        .tooltip-custom::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 12px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 0.75em;
            font-weight: 600;
            white-space: nowrap;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            opacity: 0;
            pointer-events: none;
            transition: all var(--transition-fast);
            margin-bottom: 8px;
        }

        .tooltip-custom:hover::after {
            opacity: 1;
        }

        /* ==================== BADGE BASE ==================== */
        .badge-premium {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: var(--radius-full);
            font-weight: 600;
            font-size: 0.8em;
            white-space: nowrap;
        }

        .badge-green {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-green);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge-red {
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-red);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .badge-yellow {
            background: rgba(245, 158, 11, 0.1);
            color: var(--accent-yellow);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .badge-blue {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-blue);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        /* ==================== DIVIDER ==================== */
        .divider-premium {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 24px 0;
        }

        .divider-gradient {
            border: none;
            height: 1px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(16, 185, 129, 0.3), 
                rgba(16, 185, 129, 0.5), 
                rgba(16, 185, 129, 0.3), 
                transparent
            );
            margin: 24px 0;
        }

        /* ==================== ALERT BASE ==================== */
        .alert-premium {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            border-radius: var(--radius-lg);
            font-weight: 500;
            font-size: 0.9em;
            animation: fadeInDown 0.5s ease forwards;
        }

        .alert-premium i {
            font-size: 1.2em;
            flex-shrink: 0;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--accent-green);
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--accent-red);
        }

        .alert-warning {
            background: rgba(245, 158, 11, 0.08);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: var(--accent-yellow);
        }

        .alert-info {
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: var(--accent-blue);
        }

        /* ==================== CARD BASE ==================== */
        .card-premium {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            transition: all var(--transition-base);
        }

        .card-premium:hover {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: var(--shadow-lg);
        }

        /* ==================== MODAL BASE ==================== */
        .modal-premium .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
        }

        .modal-premium .modal-header {
            border-bottom: 1px solid var(--border-color);
            padding: 20px 24px;
        }

        .modal-premium .modal-body {
            padding: 24px;
        }

        .modal-premium .modal-footer {
            border-top: 1px solid var(--border-color);
            padding: 16px 24px;
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 768px) {
            body {
                font-size: 14px;
            }
            
            .hide-mobile {
                display: none !important;
            }
        }

        @media (max-width: 480px) {
            body {
                font-size: 13px;
            }
            
            .hide-xs {
                display: none !important;
            }
        }

        /* ==================== PRINT ==================== */
        @media print {
            body {
                background: #fff !important;
                color: #000 !important;
            }
            
            .no-print {
                display: none !important;
            }
        }

        /* ==================== REDUCE MOTION ==================== */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
    
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Loading Screen -->
    <div id="global-loader" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--bg-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.3s ease;
    ">
        <div style="text-align: center;">
            <div style="font-size: 3em; animation: bounce 1s ease-in-out infinite;">⚽</div>
            <div style="color: var(--text-muted); margin-top: 12px; font-weight: 500;">Carregando...</div>
        </div>
    </div>
    
    <!-- Toast Container -->
    <div id="toast-container" style="
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 10px;
    "></div>
    
    <!-- Main Content -->
    {% block content %}{% endblock %}
    
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // ==================== GLOBAL LOADER ====================
        window.addEventListener('load', function() {
            const loader = document.getElementById('global-loader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 300);
            }
        });
        
        // ==================== TOAST SYSTEM ====================
        function showToast(message, type = 'success', duration = 4000) {
            const container = document.getElementById('toast-container');
            
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                warning: 'fa-exclamation-triangle',
                info: 'fa-info-circle'
            };
            
            const colors = {
                success: '#10b981',
                error: '#ef4444',
                warning: '#f59e0b',
                info: '#3b82f6'
            };
            
            const toast = document.createElement('div');
            toast.style.cssText = `
                background: var(--bg-card);
                border: 1px solid ${colors[type]}40;
                border-left: 4px solid ${colors[type]};
                color: var(--text-primary);
                padding: 14px 20px;
                border-radius: var(--radius-md);
                display: flex;
                align-items: center;
                gap: 12px;
                font-weight: 500;
                font-size: 0.9em;
                box-shadow: var(--shadow-lg);
                animation: fadeInRight 0.3s ease forwards;
                min-width: 300px;
                max-width: 450px;
                cursor: pointer;
                transition: all 0.3s ease;
            `;
            
            toast.innerHTML = `
                <i class="fas ${icons[type]}" style="color: ${colors[type]}; font-size: 1.2em;"></i>
                <span style="flex: 1;">${message}</span>
                <i class="fas fa-times" style="color: var(--text-muted); font-size: 0.8em; opacity: 0.5;"></i>
            `;
            
            toast.addEventListener('click', () => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100px)';
                setTimeout(() => toast.remove(), 300);
            });
            
            container.appendChild(toast);
            
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateX(100px)';
                    setTimeout(() => toast.remove(), 300);
                }
            }, duration);
        }
        
        // ==================== CONFIRM DIALOG ====================
        function showConfirm(message, callback) {
            if (confirm(message)) {
                callback();
            }
        }
        
        // ==================== FORMAT UTILS ====================
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('pt-BR');
        }
        
        function formatDateTime(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('pt-BR') + ' ' + date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }
        
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        // ==================== DEBOUNCE ====================
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }
        
        // ==================== ESC KEY ====================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                // Fechar modais abertos
                const modals = document.querySelectorAll('.modal.show');
                modals.forEach(modal => {
                    const instance = bootstrap.Modal.getInstance(modal);
                    if (instance) instance.hide();
                });
            }
        });
        
        console.log('%c⚽ FACILITA.AI %cv1.0',
            'font-size: 1.5em; font-weight: bold; color: #10b981;',
            'color: #94a3b8;');
        console.log('%cSistema de Gerenciamento de Eventos Esportivos',
            'color: #64748b; font-style: italic;');
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
